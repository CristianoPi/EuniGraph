name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "chore/**"
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-dev python3-pip python3-venv python3-graph-tool libpq-dev

      - name: Install uv
        run: python3 -m pip install --break-system-packages uv

      - name: Install backend dependencies
        run: cd backend && uv sync --group dev

      - name: Run Ruff
        run: cd backend && uv run ruff check src tests

      - name: Run mypy
        run: cd backend && uv run mypy src

      - name: Run pytest
        env:
          EUNIGRAPH_DATABASE_URL: postgresql+psycopg://eunigraph:eunigraph@localhost:5432/eunigraph
          EUNIGRAPH_QDRANT_URL: http://localhost:6333
        run: cd backend && uv run pytest
