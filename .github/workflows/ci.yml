name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "chore/**"
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build backend CI image
        run: |
          docker build -t eunigraph-backend-ci -f infra/docker/backend.Dockerfile .

      - name: Run backend checks in container
        run: |
          docker run --rm \
            -v "$PWD/backend:/app/backend" \
            -w /app/backend \
            eunigraph-backend-ci \
            sh -lc 'uv sync --active --group dev && uv run --active ruff check src tests && uv run --active mypy src && uv run --active pytest'
