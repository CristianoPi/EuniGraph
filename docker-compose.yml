services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: eunigraph-backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: python3 -m uvicorn eunigraph.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/backend/src

  postgres:
    image: postgres:16-alpine
    container_name: eunigraph-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eunigraph}
      POSTGRES_USER: ${POSTGRES_USER:-eunigraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eunigraph}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eunigraph} -d ${POSTGRES_DB:-eunigraph}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: eunigraph-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  frontend:
    profiles: ["ui"]
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    container_name: eunigraph-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
